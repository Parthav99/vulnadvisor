name: "Bug report"
description: "Something other than a missed reachable vuln is wrong (crash, wrong output, bad UX). For a suspected false negative, use the dedicated template."
title: "[BUG] "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for the report. If VulnAdvisor said something was **safe** that you think is
        reachable, please use the "Suspected false negative" template instead — that is our
        highest-priority class. Do not paste secrets; redact tokens and private code.
  - type: textarea
    id: what_happened
    attributes:
      label: What happened
      description: What did you expect, and what did you get instead?
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: The exact command(s) and, if possible, a minimal project that triggers it.
      render: shell
    validations:
      required: true
  - type: textarea
    id: output
    attributes:
      label: Output / traceback
      render: shell
  - type: input
    id: version
    attributes:
      label: VulnAdvisor version
      placeholder: "vulnadvisor --version"
    validations:
      required: true
  - type: input
    id: env
    attributes:
      label: OS and Python version
      placeholder: "e.g. macOS 14, Python 3.12.4"
    validations:
      required: true
