name: Release

# Publishes to PyPI when a version tag is pushed (or run manually). Uses PyPI Trusted Publishing
# (OIDC) — configure the publisher at https://pypi.org/manage/account/publishing/ for this repo and
# the "pypi" environment; no API token secret is needed.

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

jobs:
  publish:
    name: Build and publish to PyPI
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write # required for Trusted Publishing
      contents: read # required to checkout the private repo
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.11.19"

      - name: Build sdist + wheel
        run: uv build

      - name: Verify the wheel installs and runs in a clean venv
        run: |
          python3 -m venv /tmp/rel
          /tmp/rel/bin/pip install dist/*.whl
          /tmp/rel/bin/vulnadvisor --version

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
